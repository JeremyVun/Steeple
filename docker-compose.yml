# Steeple stack: Postgres + the containerised apps on a private compose network.
# Only `web` and `admin` publish host ports; `api` and `flags` are internal-only (reachable by
# other services over the `steeple` network). Admin sits behind caddy/authelia at the edge.
# The apps run in Production here (HSTS, Secure cookies, real error pages); the inner dev loop
# is `dotnet run` (Development). Postgres is bound to localhost purely for that dev loop.
services:
  postgres:
    image: postgres:18-alpine
    container_name: steeple-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-steeple}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-steeple_dev_pw}
      POSTGRES_DB: ${POSTGRES_DB:-steeple}
      # Pin the data dir so the named volume maps to PGDATA directly. The postgres:18 image
      # otherwise stores data in a versioned subdir, which would silently re-init on a major bump.
      PGDATA: /var/lib/postgresql/data
    # Bound to 127.0.0.1 only: exposed for the local `dotnet run` dev loop, not the host network.
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5433}:5432"
    volumes:
      - steeple_pgdata:/var/lib/postgresql/data
    networks:
      - steeple
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-steeple} -d ${POSTGRES_DB:-steeple}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot schema + seed. Runs Liquibase against Postgres, applies the changelog, then exits 0.
  # This is the ONLY component that migrates — the apps never do.
  migrate:
    image: liquibase/liquibase:4.31
    container_name: steeple-migrate
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./db/changelog:/liquibase/changelog:ro
    networks:
      - steeple
    command:
      - --search-path=/liquibase/changelog
      - --changelog-file=db.changelog-master.yaml
      - --url=jdbc:postgresql://postgres:5432/${POSTGRES_DB:-steeple}
      - --username=${POSTGRES_USER:-steeple}
      - --password=${POSTGRES_PASSWORD:-steeple_dev_pw}
      - update
    restart: "no"

  # Backend API for the web funnel and the future mobile edge. Reads the shared Postgres; never migrates.
  # Internal only — not published to the host. The web funnel reaches it at http://api:8080.
  api:
    # image: steeple-api:${STEEPLE_API_VERSION:-latest}
    container_name: steeple-api
    build:
      context: .
      dockerfile: src/Steeple.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__SteepleDb: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-steeple};Username=${POSTGRES_USER:-steeple};Password=${POSTGRES_PASSWORD:-steeple_dev_pw}"
      # Dev-only default signing key — production MUST override via .env (AUTH_JWT_SIGNING_KEY).
      Auth__Jwt__SigningKey: "${AUTH_JWT_SIGNING_KEY:-4kdPT0yylVMLDzUyD9BXXtDNbjM01xd1Cx3BgDMHo9Q=}"
      Auth__Google__ClientIds__0: "${GOOGLE_CLIENT_ID:-}"
      Auth__Apple__ClientIds__0: "${APPLE_SERVICES_ID:-}"
      Turnstile__SecretKey: "${TURNSTILE_SECRET_KEY:-}"
      # Media (ROADMAP Phase 5): without Spaces settings (MEDIA_* below) uploads land on the
      # local-disk store and the API serves them itself at /media — which is why the api
      # publishes a loopback port here (browsers must reach the photo URLs). Production
      # supplies the Spaces/CDN settings and needs no published api port.
      Media__PublicBaseUrl: "${MEDIA_PUBLIC_BASE_URL:-http://localhost:8081}"
      Media__ServiceUrl: "${MEDIA_SERVICE_URL:-}"
      Media__Bucket: "${MEDIA_BUCKET:-}"
      Media__AccessKey: "${MEDIA_ACCESS_KEY:-}"
      Media__SecretKey: "${MEDIA_SECRET_KEY:-}"
      Geocoding__GoogleApiKey: "${GEOCODING_GOOGLE_API_KEY:-}"
      Flags__mobile.manage_enabled: "${MOBILE_MANAGE_ENABLED:-false}"
    # Loopback-only, for the local-disk media loop above; compose-internal otherwise.
    ports:
      - "127.0.0.1:${API_PORT:-8081}:8080"
    volumes:
      - steeple_api_media:/app/media-store
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - steeple
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  web:
    # image: steeple-web:${STEEPLE_WEB_VERSION:-latest}
    container_name: steeple-web
    build:
      context: .
      dockerfile: src/Steeple.Web/Dockerfile
    environment:
      # Pure frontend — no database. It calls the API for all data.
      ASPNETCORE_ENVIRONMENT: Production
      Api__BaseUrl: "http://api:8080"
      # Persisted so the encrypted auth cookie survives redeploys.
      DataProtection__KeysPath: /keys
      Auth__Google__ClientId: "${GOOGLE_CLIENT_ID:-}"
      Auth__Apple__ServicesId: "${APPLE_SERVICES_ID:-}"
      Turnstile__SiteKey: "${TURNSTILE_SITE_KEY:-}"
      # Config-backed flag until the flags SDK is wired — ROADMAP Phase 0 leftover.
      Flags__web.sign_in_enabled: "${WEB_SIGN_IN_ENABLED:-false}"
      Flags__web.apply_from_browser: "${WEB_APPLY_FROM_BROWSER:-false}"
      Flags__web.manage_enabled: "${WEB_MANAGE_ENABLED:-false}"
      Flags__web.availability_picker: "${WEB_AVAILABILITY_PICKER:-true}"
    ports:
      - "${WEB_PORT:-8080}:8080"
    volumes:
      - steeple_web_keys:/keys
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - steeple
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8080/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  admin:
    # image: steeple-admin:${STEEPLE_ADMIN_VERSION:-latest}
    container_name: steeple-admin
    build:
      context: .
      dockerfile: src/Steeple.Admin/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__SteepleDb: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-steeple};Username=${POSTGRES_USER:-steeple};Password=${POSTGRES_PASSWORD:-steeple_dev_pw}"
    ports:
      - "${ADMIN_PORT:-8082}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - steeple
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

networks:
  steeple:
    driver: bridge

volumes:
  steeple_pgdata:
  steeple_web_keys:
  steeple_api_media:
