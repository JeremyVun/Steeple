# Liquibase master changelog. Thin include manifest only — all DDL/DML lives in the SQL files
# (formatted-SQL changelogs can't include each other, so the manifest is YAML). Applied by the
# one-shot "migrate" service in docker-compose.yml; the apps never migrate.
databaseChangeLog:
  - include:
      file: 001-schema.sql
      relativeToChangelogFile: true
  - include:
      file: 002-seed.sql
      relativeToChangelogFile: true
  - include:
      file: 003-identity.sql
      relativeToChangelogFile: true
  - include:
      file: 004-applications.sql
      relativeToChangelogFile: true
  - include:
      file: 005-bookings.sql
      relativeToChangelogFile: true
  - include:
      file: 006-manage.sql
      relativeToChangelogFile: true
  - include:
      file: 007-venue-verification.sql
      relativeToChangelogFile: true
  - include:
      file: 008-ratings.sql
      relativeToChangelogFile: true
  - include:
      file: 009-availability.sql
      relativeToChangelogFile: true
